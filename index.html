<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片水印工具 - 平铺/单行水印双模式</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, sans-serif;
        }
        body {
            background: #f5f7fa;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .container {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 24px;
        }
        .panel {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        h2 {
            margin-bottom: 16px;
            color: #222;
            font-size: 18px;
        }
        .control-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: #444;
        }
        input[type="text"], input[type="range"], input[type="file"], select, input[type="color"] {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 6px;
        }
        .range-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .range-row span {
            width: 40px;
            text-align: right;
            font-size: 14px;
        }
        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            margin-top: 8px;
        }
        .btn-primary {
            background: #2563eb;
            color: white;
        }
        .btn-success {
            background: #16a34a;
            color: white;
        }
        .preview-box {
            background: #eee;
            min-height: 600px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: auto;
            position: relative;
        }
        #previewCanvas {
            max-width: 100%;
            cursor: move;
            touch-action: none;
        }
        .tip {
            font-size: 12px;
            color: #666;
            margin-top: 4px;
        }
        @media (max-width: 768px) {
            body {
                padding: 12px;
            }
            h1 {
                font-size: 18px !important;
                margin-bottom: 12px !important;
                text-align: center;
            }
            .container {
                grid-template-columns: 1fr;
                gap: 16px;
            }
            .panel {
                padding: 16px;
            }
            .preview-box {
                min-height: 300px;
                order: -1;
            }
            .btn-row {
                display: flex;
                gap: 10px;
            }
            .btn-row button {
                flex: 1;
            }
        }
    </style>
</head>
<body>
    <h1 style="margin-bottom:20px;font-size:22px;">图片水印生成器（平铺/单行水印）</h1>
    <div class="container">
        <!-- 左侧控制面板 -->
        <div class="panel">
            <h2>操作设置</h2>
            <div class="control-group">
                <label>上传原图</label>
                <input type="file" id="imgUpload" accept="image/*">
            </div>

            <div class="control-group">
                <label>水印渲染模式</label>
                <select id="renderMode">
                    <option value="tile">全屏平铺水印</option>
                    <option value="single">单行角落水印</option>
                </select>
                <div class="tip">单行模式可鼠标/触摸拖动水印位置</div>
            </div>

            <div class="control-group">
                <label>水印类型</label>
                <select id="waterType">
                    <option value="text">文字水印</option>
                    <option value="logo">图片Logo水印</option>
                </select>
            </div>

            <div class="control-group" id="textPanel">
                <label>水印文字</label>
                <input type="text" id="waterText" value="版权所有 ©2026">
            </div>

            <div class="control-group" id="logoPanel" style="display:none;">
                <label>上传Logo（透明PNG最佳）</label>
                <input type="file" id="logoUpload" accept="image/*">
            </div>

            <div class="control-group">
                <label>水印大小</label>
                <div class="range-row">
                    <input type="range" id="waterSize" min="20" max="150" value="60">
                    <span id="sizeVal">60</span>
                </div>
            </div>

            <div class="control-group">
                <label>透明度</label>
                <div class="range-row">
                    <input type="range" id="waterAlpha" min="10" max="100" value="30">
                    <span id="alphaVal">30%</span>
                </div>
                <div class="tip">平铺防盗建议10~40%</div>
            </div>

            <div class="control-group">
                <label>水印颜色</label>
                <input type="color" id="waterColor" value="#000000">
            </div>

            <div class="control-group">
                <label>水印旋转角度</label>
                <div class="range-row">
                    <input type="range" id="waterRotate" min="0" max="45" value="20">
                    <span id="rotateVal">20°</span>
                </div>
            </div>

            <div class="control-group" id="gapGroup">
                <label>水印间距（仅平铺模式生效）</label>
                <div class="range-row">
                    <input type="range" id="waterGap" min="30" max="200" value="80">
                    <span id="gapVal">80</span>
                </div>
            </div>

            <div class="btn-row">
                <button class="btn-primary" id="renderBtn">生成水印预览</button>
                <button class="btn-success" id="downloadBtn">下载带水印图片</button>
            </div>
        </div>

        <!-- 右侧预览画布 -->
        <div class="panel preview-box">
            <canvas id="previewCanvas"></canvas>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('previewCanvas');
        const ctx = canvas.getContext('2d');
        const imgUpload = document.getElementById('imgUpload');
        const logoUpload = document.getElementById('logoUpload');
        const renderMode = document.getElementById('renderMode');
        const waterType = document.getElementById('waterType');
        const textPanel = document.getElementById('textPanel');
        const logoPanel = document.getElementById('logoPanel');
        const gapGroup = document.getElementById('gapGroup');
        const waterText = document.getElementById('waterText');
        const waterSize = document.getElementById('waterSize');
        const sizeVal = document.getElementById('sizeVal');
        const waterAlpha = document.getElementById('waterAlpha');
        const alphaVal = document.getElementById('alphaVal');
        const waterColor = document.getElementById('waterColor');
        const waterRotate = document.getElementById('waterRotate');
        const rotateVal = document.getElementById('rotateVal');
        const waterGap = document.getElementById('waterGap');
        const gapVal = document.getElementById('gapVal');
        const renderBtn = document.getElementById('renderBtn');
        const downloadBtn = document.getElementById('downloadBtn');

        let sourceImg = null;
        let logoImg = null;
        let singleX = 50;
        let singleY = 50;
        let isDrag = false;
        let dragOffsetX = 0;
        let dragOffsetY = 0;
        let dragRafId = null;

        renderMode.onchange = () => {
            gapGroup.style.display = renderMode.value === 'tile' ? 'block' : 'none';
        }

        waterType.onchange = () => {
            if (waterType.value === 'text') {
                textPanel.style.display = 'block';
                logoPanel.style.display = 'none';
            } else {
                textPanel.style.display = 'none';
                logoPanel.style.display = 'block';
            }
        };

        waterSize.oninput = () => sizeVal.textContent = waterSize.value;
        waterAlpha.oninput = () => alphaVal.textContent = waterAlpha.value + '%';
        waterRotate.oninput = () => rotateVal.textContent = waterRotate.value + '°';
        waterGap.oninput = () => gapVal.textContent = waterGap.value;

        imgUpload.onchange = e => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = ev => {
                sourceImg = new Image();
                sourceImg.onerror = () => alert("图片加载失败，请检查文件是否损坏！");
                sourceImg.src = ev.target.result;
                sourceImg.onload = () => {
                    canvas.width = sourceImg.width;
                    canvas.height = sourceImg.height;
                    singleX = canvas.width - 120;
                    singleY = canvas.height - 80;
                    drawSource();
                }
            }
            reader.readAsDataURL(file);
        };

        logoUpload.onchange = e => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = ev => {
                logoImg = new Image();
                logoImg.onerror = () => alert("Logo图片加载失败，请检查文件是否损坏！");
                logoImg.src = ev.target.result;
            }
            reader.readAsDataURL(file);
        };

        function drawSource() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            if(sourceImg) ctx.drawImage(sourceImg,0,0);
        }

        function getHitBox() {
            const size = Number(waterSize.value);
            let boxW, boxH;
            if (waterType.value === 'text') {
                ctx.font = `${size}px sans-serif`;
                boxW = ctx.measureText(waterText.value).width;
                boxH = size * 1.2;
            } else {
                boxW = size;
                boxH = size;
            }
            const diagonal = Math.sqrt(boxW * boxW + boxH * boxH);
            const pad = Math.max(40, size);
            return {
                x: singleX - pad,
                y: singleY - diagonal - pad,
                w: diagonal + pad * 2,
                h: diagonal + pad * 2
            };
        }

        function drawDragHighlight() {
            if (renderMode.value !== 'single' || !sourceImg) return;
            const size = Number(waterSize.value);
            let boxW, boxH;
            if (waterType.value === 'text') {
                ctx.font = `${size}px sans-serif`;
                boxW = ctx.measureText(waterText.value).width;
                boxH = size * 1.2;
            } else {
                boxW = size;
                boxH = size;
            }
            ctx.save();
            ctx.globalAlpha = 0.4;
            ctx.strokeStyle = '#2563eb';
            ctx.lineWidth = Math.max(2, canvas.width / 500);
            ctx.setLineDash([Math.max(8, canvas.width / 200), Math.max(6, canvas.width / 300)]);
            ctx.translate(singleX, singleY);
            ctx.rotate(Number(waterRotate.value) * Math.PI / 180);
            ctx.strokeRect(-4, -boxH - 4, boxW + 8, boxH + 8);
            ctx.restore();
        }

        function getPointerPos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            return {
                x: (e.clientX - rect.left) * scaleX,
                y: (e.clientY - rect.top) * scaleY
            };
        }

        function moveWatermark(pos) {
            singleX = pos.x - dragOffsetX;
            singleY = pos.y - dragOffsetY;
            if (!dragRafId) {
                dragRafId = requestAnimationFrame(() => {
                    renderBtn.click();
                    dragRafId = null;
                });
            }
        }

        canvas.addEventListener('mousedown', e=>{
            if(renderMode.value !== 'single' || !sourceImg) return;
            const pos = getPointerPos(e);
            const box = getHitBox();
            if(pos.x >= box.x && pos.x <= box.x+box.w && pos.y >= box.y && pos.y <= box.y+box.h){
                isDrag = true;
                dragOffsetX = pos.x - singleX;
                dragOffsetY = pos.y - singleY;
            }
        })
        canvas.addEventListener('mousemove', e=>{
            if(!isDrag || renderMode.value !== 'single') return;
            const pos = getPointerPos(e);
            moveWatermark(pos);
        })
        canvas.addEventListener('mouseup', ()=>isDrag=false);
        canvas.addEventListener('mouseleave', ()=>isDrag=false);

        canvas.addEventListener('touchstart', e=>{
            if(renderMode.value !== 'single' || !sourceImg) return;
            e.preventDefault();
            const pos = getPointerPos(e.touches[0]);
            const box = getHitBox();
            if(pos.x >= box.x && pos.x <= box.x+box.w && pos.y >= box.y && pos.y <= box.y+box.h){
                isDrag = true;
                dragOffsetX = pos.x - singleX;
                dragOffsetY = pos.y - singleY;
            }
        }, {passive: false})
        canvas.addEventListener('touchmove', e=>{
            if(!isDrag || renderMode.value !== 'single') return;
            e.preventDefault();
            const pos = getPointerPos(e.touches[0]);
            moveWatermark(pos);
        }, {passive: false})
        canvas.addEventListener('touchend', ()=>isDrag=false);
        canvas.addEventListener('touchcancel', ()=>isDrag=false);

        function renderWatermark(forExport) {
            if (!sourceImg) return alert("请先上传图片！");
            if (waterType.value === 'logo' && !logoImg) return alert("请上传Logo图片！");
            drawSource();

            const size = Number(waterSize.value);
            const alpha = Number(waterAlpha.value) / 100;
            const rotate = Number(waterRotate.value) * Math.PI / 180;
            const gap = Number(waterGap.value);
            const color = waterColor.value;
            const w = canvas.width;
            const h = canvas.height;

            ctx.globalAlpha = alpha;

            if(renderMode.value === 'tile'){
                if (waterType.value === 'text') {
                    const text = waterText.value;
                    ctx.font = `${size}px sans-serif`;
                    ctx.fillStyle = color;
                    let x = -size, y = -size;
                    while (y < h + size) {
                        while (x < w + size) {
                            ctx.save();
                            ctx.translate(x, y);
                            ctx.rotate(rotate);
                            ctx.fillText(text, 0, 0);
                            ctx.restore();
                            x += gap + size * 1.8;
                        }
                        x = -size;
                        y += gap + size;
                    }
                } else {
                    let x = -size, y = -size;
                    while (y < h + size) {
                        while (x < w + size) {
                            ctx.save();
                            ctx.translate(x, y);
                            ctx.rotate(rotate);
                            ctx.drawImage(logoImg, 0, 0, size, size);
                            ctx.restore();
                            x += gap + size;
                        }
                        x = -size;
                        y += gap + size;
                    }
                }
            }else{
                if (waterType.value === 'text') {
                    const text = waterText.value;
                    ctx.font = `${size}px sans-serif`;
                    ctx.fillStyle = color;
                    ctx.save();
                    ctx.translate(singleX, singleY);
                    ctx.rotate(rotate);
                    ctx.fillText(text, 0, 0);
                    ctx.restore();
                } else {
                    ctx.save();
                    ctx.translate(singleX, singleY);
                    ctx.rotate(rotate);
                    ctx.drawImage(logoImg, 0, 0, size, size);
                    ctx.restore();
                }
            }
            if (!forExport) drawDragHighlight();
            ctx.globalAlpha = 1;
        }

        renderBtn.onclick = renderWatermark;

        downloadBtn.onclick = () => {
            if (!sourceImg) return alert("请先上传图片并生成水印");
            renderWatermark(true);
            const link = document.createElement('a');
            link.download = '带水印图片.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
            renderWatermark();
        }
    </script>
</body>
</html>
